{% extends 'base.html' %}

{% block content %}
<section class="card">
    <h2>Log in</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log in</button>
    </form>
    <p>No account yet? <a href="{% url 'signup' %}">Create one</a>.</p>
</section>
{% endblock %}
