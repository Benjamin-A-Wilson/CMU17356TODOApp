{% extends 'base.html' %}

{% block content %}
<section class="card warning">
    <h2>Delete task</h2>
    <p>Are you sure you want to delete <strong>{{ task.title }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
    </form>
    <p><a href="{% url 'task-list' %}">Cancel</a></p>
</section>
{% endblock %}
